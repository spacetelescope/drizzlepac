name: Weekly cron

on:
  schedule:
    # Weekly Monday 6AM build
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  crds_contexts:
    runs-on: ubuntu-latest
    steps:
      - id: context
        uses: spacetelescope/crds/.github/actions/contexts@598b076b15ea9c381307d51688db2abb953c4f5e
        with:
          require_hst: true
    outputs:
      hst: ${{ steps.context.outputs.hst }}
  test:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e97344095b099e1d729fe97429078c9975921d8a  # v2.6.2
    needs: [ crds_contexts ]
    with:
      setenv: |
        CRDS_PATH: /tmp/data/crds_cache/
        CRDS_SERVER_URL: https://hst-crds.stsci.edu
        CRDS_CLIENT_RETRY_COUNT: 3
        CRDS_CLIENT_RETRY_DELAY_SECONDS: 20
      cache-path: /tmp/data/crds_cache/
      cache-key: ${{ needs.crds_contexts.outputs.hst }}
      libraries: |
        brew:
          - hdf5
      envs: |
        - linux: py3-devdeps-xdist
        - macos: py3-devdeps-xdist
      toxdeps: tox-uv
